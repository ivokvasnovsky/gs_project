version: 2

models:
  - name: fct_dd_progress_EUR
    description: "fact table dd progress"
    constraints:
      - type: foreign_key
        columns: [cpa_id]
        to: ref('dim_customers') 

    columns:
      - name: ctry_cd
        data_type: varchar
        description: "{{ doc('ctry_cd') }}"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_geo_hier')
                field: ctry_cd

      - name: cpa_id
        data_type: varchar
        description: "{{ doc('cpa_id') }}"
        data_tests:
          - not_null        
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: cpa_id

      - name: report_ts
        data_type: timestamp_ntz
        description: "{{ doc('report_ts') }}"

      - name: discount_key
        data_type: varchar
        description: "{{ doc('discount_key') }}"

      - name: payer_ctry_cd
        data_type: varchar
        description: "{{ doc('payer_ctry_cd') }}"

      - name: discount_pid
        data_type: varchar
        description: "{{ doc('discount_pid') }}"

      - name: measurement_period
        data_type: number
        description: "{{ doc('measurement_period') }}"

      - name: discounting_period
        data_type: number
        description: "{{ doc('discounting_period') }}"

      - name: discounted_products_grp
        data_type: varchar
        description: "{{ doc('discounted_products_grp') }}"

      - name: threshold_type
        data_type: varchar
        description: "{{ doc('threshold_type') }}"

      - name: ramp_up_period
        data_type: number
        description: "{{ doc('ramp_up_period') }}"

      - name: ramp_up_end_dt
        data_type: date
        description: "{{ doc('ramp_up_end_dt') }}"

      - name: currency_cd
        data_type: varchar
        description: "{{ doc('currency_cd') }}"

      - name: initial_discount_amt
        data_type: number
        description: "{{ doc('initial_discount_amt') }}"

      - name: initial_discount_pct
        data_type: number
        description: "{{ doc('initial_discount_pct') }}"

      - name: initial_discount_period
        data_type: number
        description: "{{ doc('initial_discount_period') }}"

      - name: discount_tiers_and_values
